<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التواصل المدرسي - متوسطة المنذر بن عمرو الأنصاري</title>
    <style>
        /* ========== المتغيرات العامة ========== */
        :root {
            --primary-green: #2d5f3f;
            --light-green: #4a7c59;
            --bg-gray: #f5f5f5;
            --white: #ffffff;
            --border-gray: #ddd;
            --text-dark: #333;
            --text-gray: #666;
            --danger-red: #d32f2f;
            --warning-orange: #f57c00;
            --success-green: #388e3c;
        }

        /* ========== إعادة تعيين وإعدادات أساسية ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* ========== الهيدر الرسمي ========== */
        .header {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--light-green) 100%);
            color: var(--white);
            padding: 1.5rem 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .school-name {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .school-subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 0.25rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        /* ========== الأزرار ========== */
        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background-color: var(--white);
            color: var(--primary-green);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--white);
            border: 2px solid var(--white);
        }

        .btn-secondary:hover {
            background-color: var(--white);
            color: var(--primary-green);
        }

        .btn-success {
            background-color: var(--success-green);
            color: var(--white);
        }

        .btn-success:hover {
            background-color: #2e7d32;
        }
        
        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        /* ========== الحاوية الرئيسية ========== */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--white);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }

        .card-title {
            font-size: 1.3rem;
            color: var(--primary-green);
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border-gray);
        }

        /* ========== نماذج الإدخال ========== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-gray);
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(45, 95, 63, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        /* ========== جدول الواجبات ========== */
        .homework-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            overflow-x: auto;
            display: block;
        }

        .homework-table th,
        .homework-table td {
            padding: 1rem;
            text-align: right;
            border-bottom: 1px solid var(--border-gray);
            white-space: nowrap;
        }

        .homework-table th {
            background-color: var(--primary-green);
            color: var(--white);
            font-weight: 600;
        }
        
        .homework-table .day-header-row th {
            background-color: var(--light-green);
            color: white;
            text-align: center;
            font-size: 1.1rem;
            padding: 0.75rem;
        }

        .homework-table tr:hover {
            background-color: #f9f9f9;
        }

        .exam-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background-color: var(--danger-red);
            color: var(--white);
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .exam-badge.alert-exam {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }

        /* ========== نموذج المعلم ========== */
        .subject-input-card {
            background-color: #fafafa;
            padding: 1.5rem;
            border-radius: 6px;
            border: 1px solid var(--border-gray);
            margin-top: 1.5rem;
        }

        /* ========== رسالة فارغة ========== */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-gray);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* ========== Modal تسجيل الدخول ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            padding: 2rem;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* ========== الأدوات المساعدة ========== */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .alert {
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
        }
        
        .alert-warning {
            background-color: #fff3cd;
            color: #856404;
        }

        .done > td:not(:last-child) {
            text-decoration: line-through;
            color: #999;
            background-color: #e8f5e9;
        }
        .done > td strong {
            color: var(--success-green);
        }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ========== الهيدر ========== -->
    <header class="header">
        <div class="header-content">
            <div>
                <div class="school-name">🏫 متوسطة المنذر بن عمرو الأنصاري</div>
                <div class="school-subtitle">نظام التواصل بين المعلم وولي الأمر</div>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" id="viewModeBtn" onclick="toggleView()">
                    <span id="viewModeText">عرض واجهة المعلم</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ========== الحاوية الرئيسية ========== -->
    <div class="container">
        
        <!-- قسم عرض التاريخ -->
        <div class="card text-center">
            <h2 class="card-title" style="margin-bottom: 1rem;">تاريخ اليوم</h2>
            <p id="gregorian-date" style="font-size: 1.1rem; font-weight: 500;"></p>
            <p id="hijri-date" style="font-size: 1rem;"></p>
        </div>

        <!-- ========== واجهة ولي الأمر ========== -->
        <div id="parentView">
            <div class="card">
                <h2 class="card-title">📋 عرض الواجبات الأسبوعية</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">اختر أي يوم في الأسبوع</label>
                        <input type="date" class="form-control" id="week-picker">
                    </div>

                    <div class="form-group">
                        <label class="form-label">الصف</label>
                        <select class="form-control" id="parentGrade">
                            <option value="1">الأول المتوسط</option>
                            <option value="2">الثاني المتوسط</option>
                            <option value="3">الثالث المتوسط</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">الشعبة</label>
                        <select class="form-control" id="parentSection">
                            <option value="1">شعبة 1</option>
                            <option value="2">شعبة 2</option>
                            <option value="3">شعبة 3</option>
                            <option value="4">شعبة 4</option>
                            <option value="5">شعبة 5</option>
                            <option value="6">شعبة 6</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- جدول عرض الواجبات -->
            <div class="card" id="homeworkDisplay" style="display: none;">
                <h2 class="card-title" id="homeworkTitle">الواجبات والاختبارات</h2>
                <div id="week-dates-info" class="text-center" style="font-weight: bold; margin-bottom: 1rem;"></div>
                <div id="homeworkContent"></div>
            </div>
        </div>

        <!-- ========== واجهة المعلم ========== -->
        <div id="teacherView" class="hidden">
            <div class="card">
                <h2 class="card-title">👨‍🏫 إدارة الواجبات - واجهة المعلم</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">اليوم</label>
                        <select class="form-control" id="teacherDay">
                            <option value="sunday">الأحد</option>
                            <option value="monday">الإثنين</option>
                            <option value="tuesday">الثلاثاء</option>
                            <option value="wednesday">الأربعاء</option>
                            <option value="thursday">الخميس</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">الصف</label>
                        <select class="form-control" id="teacherGrade">
                            <option value="1">الأول المتوسط</option>
                            <option value="2">الثاني المتوسط</option>
                            <option value="3">الثالث المتوسط</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">الشعبة</label>
                        <select class="form-control" id="teacherSection">
                            <option value="1">شعبة 1</option>
                            <option value="2">شعبة 2</option>
                            <option value="3">شعبة 3</option>
                            <option value="4">شعبة 4</option>
                            <option value="5">شعبة 5</option>
                            <option value="6">شعبة 6</option>
                        </select>
                    </div>
                </div>
                
                <hr style="border: 1px solid var(--border-gray); margin: 2rem 0;">

                <div class="form-group">
                    <label for="subject-select" class="form-label">اختر المادة</label>
                    <select id="subject-select" class="form-control"></select>
                </div>

                <div id="subject-input-container"></div>

                <div id="save-button-container" class="text-center mt-2 hidden">
                    <button class="btn btn-success" onclick="saveHomework()">
                        💾 حفظ بيانات المادة
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- ========== Modal تسجيل الدخول ========== -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">🔐 تسجيل دخول المعلم</h3>
            </div>
            <div class="form-group">
                <label class="form-label">كلمة المرور</label>
                <input type="password" class="form-control" id="teacherPassword" placeholder="أدخل كلمة المرور">
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-success" onclick="attemptLogin()" style="flex: 1;">دخول</button>
                <button class="btn btn-secondary" onclick="closeLoginModal()" style="flex: 1;">إلغاء</button>
            </div>
            <div id="loginError" class="alert alert-danger hidden" style="margin-top: 1rem;">
                كلمة المرور غير صحيحة
            </div>
        </div>
    </div>

    <!-- ========== JavaScript ========== -->
    <script>
        // ========== إعدادات النظام ==========
        const TEACHER_PASSWORD = "teacher123";
        const STORAGE_KEY_PREFIX = "school_homework_data";

        const SUBJECTS = [
            "التربية الإسلامية", "اللغة العربية", "الرياضيات", "العلوم", 
            "الاجتماعيات", "اللغة الإنجليزية", "التربية الفنية", "التربية البدنية", "الحاسب الآلي"
        ];

        const DAY_KEYS = ["sunday", "monday", "tuesday", "wednesday", "thursday"];
        const DAYS_AR = {
            sunday: "الأحد", monday: "الإثنين", tuesday: "الثلاثاء", wednesday: "الأربعاء", thursday: "الخميس"
        };

        let isTeacherLoggedIn = false;

        // ========== التهيئة عند تحميل الصفحة ==========
        window.onload = function() {
            displayCurrentDate();
            setupTeacherInterface();
            setupParentInterface();
            
            document.getElementById('week-picker').addEventListener('change', loadWeeklyHomeworkForParent);
            document.getElementById('parentGrade').addEventListener('change', loadWeeklyHomeworkForParent);
            document.getElementById('parentSection').addEventListener('change', loadWeeklyHomeworkForParent);

            document.getElementById('teacherDay').addEventListener('change', setupTeacherInterface);
            document.getElementById('teacherGrade').addEventListener('change', setupTeacherInterface);
            document.getElementById('teacherSection').addEventListener('change', setupTeacherInterface);
            document.getElementById('subject-select').addEventListener('change', displaySubjectInput);

            loadWeeklyHomeworkForParent();
        };

        function displayCurrentDate() {
            const today = new Date();
            const gregorianDate = today.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const hijriDate = today.toLocaleDateString('ar-SA-u-ca-islamic', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('gregorian-date').textContent = `الميلادي: ${gregorianDate}`;
            document.getElementById('hijri-date').textContent = `الهجري: ${hijriDate}`;
        }

        function toggleView() {
            if (isTeacherLoggedIn) {
                isTeacherLoggedIn = false;
                document.getElementById('parentView').classList.remove('hidden');
                document.getElementById('teacherView').classList.add('hidden');
                document.getElementById('viewModeText').textContent = 'عرض واجهة المعلم';
            } else {
                openLoginModal();
            }
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('teacherPassword').value = '';
            document.getElementById('loginError').classList.add('hidden');
            document.getElementById('teacherPassword').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        function attemptLogin() {
            if (document.getElementById('teacherPassword').value === TEACHER_PASSWORD) {
                isTeacherLoggedIn = true;
                closeLoginModal();
                document.getElementById('parentView').classList.add('hidden');
                document.getElementById('teacherView').classList.remove('hidden');
                document.getElementById('viewModeText').textContent = 'العودة لواجهة ولي الأمر';
                setupTeacherInterface();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        document.getElementById('teacherPassword')?.addEventListener('keypress', (e) => e.key === 'Enter' && attemptLogin());

        function getStorageKey(day, grade, section) {
            return `${STORAGE_KEY_PREFIX}_${day}_${grade}_${section}`;
        }

        function getDataForDay(day, grade, section) {
            const key = getStorageKey(day, grade, section);
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : { subjects: {} };
        }

        function saveDataForDay(day, grade, section, data) {
            const key = getStorageKey(day, grade, section);
            localStorage.setItem(key, JSON.stringify(data));
        }

        function setupTeacherInterface() {
            const subjectSelect = document.getElementById('subject-select');
            subjectSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
            SUBJECTS.forEach(subject => {
                const option = document.createElement('option');
                option.value = subject;
                option.textContent = subject;
                subjectSelect.appendChild(option);
            });
            document.getElementById('subject-input-container').innerHTML = '';
            document.getElementById('save-button-container').classList.add('hidden');
        }

        function displaySubjectInput() {
            const subject = document.getElementById('subject-select').value;
            const container = document.getElementById('subject-input-container');
            const saveBtnContainer = document.getElementById('save-button-container');

            if (!subject) {
                container.innerHTML = '';
                saveBtnContainer.classList.add('hidden');
                return;
            }

            const day = document.getElementById('teacherDay').value;
            const grade = document.getElementById('teacherGrade').value;
            const section = document.getElementById('teacherSection').value;
            const existingData = getDataForDay(day, grade, section);
            const subjectData = existingData.subjects[subject] || { homework: '', page: '', dueDate: '', examDate: '', notes: '' };

            container.innerHTML = `
                <div class="subject-input-card">
                    <div class="form-group"><label class="form-label">الواجب</label><input type="text" class="form-control" id="homework_input" value="${subjectData.homework}" placeholder="مثال: حل التمارين"></div>
                    <div class="form-group"><label class="form-label">الصفحة / رقم التمرين</label><input type="text" class="form-control" id="page_input" value="${subjectData.page}" placeholder="مثال: ص 45"></div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">موعد تسليم الواجب</label><input type="date" class="form-control" id="dueDate_input" value="${subjectData.dueDate}"></div>
                        <div class="form-group"><label class="form-label">موعد الاختبار</label><input type="date" class="form-control" id="examDate_input" value="${subjectData.examDate}"></div>
                    </div>
                    <div class="form-group"><label class="form-label">ملاحظات</label><input type="text" class="form-control" id="notes_input" value="${subjectData.notes}" placeholder="ملاحظات إضافية (اختياري)"></div>
                </div>`;
            saveBtnContainer.classList.remove('hidden');
        }

        function saveHomework() {
            const day = document.getElementById('teacherDay').value;
            const grade = document.getElementById('teacherGrade').value;
            const section = document.getElementById('teacherSection').value;
            const subject = document.getElementById('subject-select').value;

            if (!subject) { alert('الرجاء اختيار المادة أولاً.'); return; }

            const homeworkData = getDataForDay(day, grade, section);
            homeworkData.subjects[subject] = {
                homework: document.getElementById('homework_input').value,
                page: document.getElementById('page_input').value,
                dueDate: document.getElementById('dueDate_input').value,
                examDate: document.getElementById('examDate_input').value,
                notes: document.getElementById('notes_input').value,
                done: homeworkData.subjects[subject]?.done || false
            };
            homeworkData.timestamp = new Date().toISOString();
            saveDataForDay(day, grade, section, homeworkData);
            alert('✅ تم حفظ بيانات المادة بنجاح!');
        }

        function setupParentInterface() {
            const weekPicker = document.getElementById('week-picker');
            const today = new Date();
            weekPicker.value = today.toISOString().split('T')[0];
        }

        function loadWeeklyHomeworkForParent() {
            const grade = document.getElementById('parentGrade').value;
            const section = document.getElementById('parentSection').value;
            const selectedDate = new Date(document.getElementById('week-picker').value || new Date());

            const displayDiv = document.getElementById('homeworkDisplay');
            const contentDiv = document.getElementById('homeworkContent');
            const titleDiv = document.getElementById('homeworkTitle');
            const weekDatesInfoDiv = document.getElementById('week-dates-info');

            const dayOfWeek = selectedDate.getDay();
            const sunday = new Date(selectedDate);
            sunday.setDate(selectedDate.getDate() - dayOfWeek);
            
            const thursday = new Date(sunday);
            thursday.setDate(sunday.getDate() + 4);

            const formatOptions = { year: 'numeric', month: 'long', day: 'numeric' };
            const hijriFormatOptions = { ...formatOptions, calendar: 'islamic-umalqura' };
            
            weekDatesInfoDiv.innerHTML = `
                الأسبوع من: ${sunday.toLocaleDateString('ar-EG', formatOptions)} (${sunday.toLocaleDateString('ar-SA', hijriFormatOptions)})  

                إلى: ${thursday.toLocaleDateString('ar-EG', formatOptions)} (${thursday.toLocaleDateString('ar-SA', hijriFormatOptions)})
            `;

            titleDiv.textContent = `الواجبات الأسبوعية للصف ${grade}/شعبة ${section}`;
            
            let tableHTML = `<table class="homework-table"><thead><tr><th>المادة</th><th>الواجب</th><th>الصفحة</th><th>التسليم/الاختبار</th><th>ملاحظات</th><th>الحالة</th></tr></thead><tbody>`;
            let weeklyHomeworkFound = false;

            for (let i = 0; i < 5; i++) {
                const currentDay = new Date(sunday);
                currentDay.setDate(sunday.getDate() + i);
                const dayKey = DAY_KEYS[i];
                
                const data = getDataForDay(dayKey, grade, section);
                const subjectsWithHomework = Object.keys(data.subjects).filter(subject => 
                    data.subjects[subject].homework || data.subjects[subject].examDate
                );

                if (subjectsWithHomework.length > 0) {
                    weeklyHomeworkFound = true;
                    const dayDate = currentDay.toLocaleDateString('ar-EG', { day: 'numeric', month: 'long' });
                    tableHTML += `<tr class="day-header-row"><th colspan="6">${DAYS_AR[dayKey]} - ${dayDate}</th></tr>`;

                    subjectsWithHomework.forEach(subject => {
                        const subjectData = data.subjects[subject];
                        const remainingDaysInfo = getRemainingDays(subjectData.dueDate);
                        const examRemainingDaysInfo = getRemainingDays(subjectData.examDate);

                        let deadlineAlertClass = '';
                        if (remainingDaysInfo.days === 1) deadlineAlertClass = 'alert-danger';
                        else if (remainingDaysInfo.days === 2) deadlineAlertClass = 'alert-warning';
                        
                        let examAlertClass = '';
                        if (examRemainingDaysInfo.days >= 0 && examRemainingDaysInfo.days <= 3) examAlertClass = 'alert-exam';

                        tableHTML += `
                            <tr class="${subjectData.done ? 'done' : ''}">
                                <td><strong>${subject}</strong></td>
                                <td>${subjectData.homework || '-'}</td>
                                <td>${subjectData.page || '-'}</td>
                                <td>
                                    ${subjectData.dueDate ? `<span class="${deadlineAlertClass}">تسليم الواجب: ${remainingDaysInfo.text}</span>` : ''}
                                    ${subjectData.examDate ? `  
<span class="exam-badge ${examAlertClass}">اختبار بعد: ${examRemainingDaysInfo.text}</span>` : ''}
                                </td>
                                <td>${subjectData.notes || '-'}</td>
                                <td>
                                    <button class="btn btn-sm ${subjectData.done ? 'btn-secondary' : 'btn-success'}" onclick="toggleDone('${dayKey}', '${grade}', '${section}', '${subject}')">
                                        ${subjectData.done ? 'إلغاء' : 'تم'}
                                    </button>
                                </td>
                            </tr>`;
                    });
                }
            }

            tableHTML += `</tbody></table>`;
            
            if (weeklyHomeworkFound) {
                contentDiv.innerHTML = tableHTML;
            } else {
                contentDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>لا توجد واجبات أو اختبارات مسجلة لهذا الأسبوع</p>
                    </div>`;
            }
            displayDiv.style.display = 'block';
        }

        function getRemainingDays(dateString) {
            if (!dateString) return { days: Infinity, text: '-' };
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const dueDate = new Date(dateString);
            dueDate.setHours(0, 0, 0, 0);
            const diffTime = dueDate.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays < 0) return { days: diffDays, text: 'فات موعده' };
            if (diffDays === 0) return { days: 0, text: 'اليوم' };
            if (diffDays === 1) return { days: 1, text: 'غدًا' };
            return { days: diffDays, text: `${diffDays} أيام` };
        }

        function toggleDone(day, grade, section, subject) {
            const data = getDataForDay(day, grade, section);
            if (data.subjects[subject]) {
                data.subjects[subject].done = !data.subjects[subject].done;
                saveDataForDay(day, grade, section, data);
                loadWeeklyHomeworkForParent();
            }
        }
    </script>

</body>
</html>
