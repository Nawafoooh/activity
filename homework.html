<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الواجبات المدرسية - للمعلم</title>
    <style>
        /* ========== المتغيرات العامة ========== */
        :root {
            --primary-green: #2d5f3f;
            --light-green: #4a7c59;
            --bg-gray: #f5f5f5;
            --white: #ffffff;
            --border-gray: #ddd;
            --text-dark: #333;
            --text-gray: #666;
            --danger-red: #d32f2f;
            --warning-orange: #f57c00;
            --success-green: #388e3c;
            --whatsapp-green: #25D366;
        }

        /* ========== إعادة تعيين وإعدادات أساسية ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* ========== الهيدر الرسمي ========== */
        .header {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--light-green) 100%);
            color: var(--white);
            padding: 1.5rem 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .school-name {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .school-subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 0.25rem;
        }

        /* ========== الأزرار ========== */
        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }

        .btn-primary {
            background-color: var(--white);
            color: var(--primary-green);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn-success {
            background-color: var(--success-green);
            color: var(--white);
        }

        .btn-success:hover {
            background-color: #2e7d32;
        }

        .btn-whatsapp {
            background-color: var(--whatsapp-green);
            color: white;
            font-weight: bold;
            width: 100%;
            margin-top: 1rem;
            padding: 0.8rem;
        }

        .btn-whatsapp:hover {
            background-color: #128C7E;
            transform: scale(1.02);
        }
        
        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        /* ========== الحاوية الرئيسية ========== */
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--white);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }

        .card-title {
            font-size: 1.3rem;
            color: var(--primary-green);
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border-gray);
        }

        /* ========== نماذج الإدخال ========== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-gray);
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(45, 95, 63, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        /* ========== رسالة فارغة ========== */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-gray);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* ========== Modal تسجيل الدخول ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            padding: 2rem;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* ========== الأدوات المساعدة ========== */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .alert {
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
        }
        
        .mt-2 {
            margin-top: 1rem;
        }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ========== الهيدر ========== -->
    <header class="header">
        <div class="header-content">
            <div>
                <div class="school-name">🏫 متوسطة المنذر بن عمرو الأنصاري</div>
                <div class="school-subtitle">نظام إدارة الواجبات المدرسية (للمعلمين)</div>
            </div>
        </div>
    </header>

    <!-- ========== الحاوية الرئيسية ========== -->
    <div class="container">
        
        <!-- ========== واجهة المعلم ========== -->
        <div id="teacherView">
            <div class="card">
                <h2 class="card-title">👨‍🏫 إرسال الواجبات إلى مجموعات الواتساب</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">الصف</label>
                        <select class="form-control" id="teacherGrade">
                            <option value="1">الأول المتوسط</option>
                            <option value="2">الثاني المتوسط</option>
                            <option value="3">الثالث المتوسط</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">الشعبة</label>
                        <select class="form-control" id="teacherSection">
                            <option value="1">شعبة 1</option>
                            <option value="2">شعبة 2</option>
                            <option value="3">شعبة 3</option>
                            <option value="4">شعبة 4</option>
                            <option value="5">شعبة 5</option>
                            <option value="6">شعبة 6</option>
                        </select>
                    </div>
                </div>
                
                <hr style="border: 1px solid var(--border-gray); margin: 2rem 0;">

                <div class="form-group">
                    <label for="subject-select" class="form-label">اختر المادة</label>
                    <select id="subject-select" class="form-control"></select>
                </div>

                <div id="subject-input-container">
                    <div class="subject-input-card">
                        <div class="form-group"><label class="form-label">الواجب</label><input type="text" class="form-control" id="homework_input" placeholder="مثال: حل التمارين"></div>
                        <div class="form-group"><label class="form-label">الصفحة / رقم التمرين</label><input type="text" class="form-control" id="page_input" placeholder="مثال: ص 45"></div>
                        <div class="form-row">
                            <div class="form-group"><label class="form-label">موعد تسليم الواجب</label><input type="date" class="form-control" id="dueDate_input"></div>
                            <div class="form-group"><label class="form-label">موعد الاختبار</label><input type="date" class="form-control" id="examDate_input"></div>
                        </div>
                        <div class="form-group"><label class="form-label">ملاحظات</label><input type="text" class="form-control" id="notes_input" placeholder="ملاحظات إضافية (اختياري)"></div>
                    </div>
                </div>

                <div class="text-center mt-2">
                    <button class="btn btn-whatsapp" onclick="sendToWhatsApp()">
                        <span>📱 إرسال الواجب إلى واتساب الفصل</span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- ========== Modal تسجيل الدخول (للمعلم فقط) ========== -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">🔐 تسجيل دخول المعلم</h3>
            </div>
            <div class="form-group">
                <label class="form-label">كلمة المرور</label>
                <input type="password" class="form-control" id="teacherPassword" placeholder="أدخل كلمة المرور">
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-success" onclick="attemptLogin()" style="flex: 1;">دخول</button>
            </div>
            <div id="loginError" class="alert alert-danger hidden" style="margin-top: 1rem;">
                كلمة المرور غير صحيحة
            </div>
        </div>
    </div>

    <!-- ========== JavaScript ========== -->
    <script>
        // ========== إعدادات النظام ==========
        const TEACHER_PASSWORD = "teacher123";

        const SUBJECTS = [
            "التربية الإسلامية", "اللغة العربية", "الرياضيات", "العلوم", 
            "الاجتماعيات", "اللغة الإنجليزية", "التربية الفنية", "التربية البدنية", "الحاسب الآلي"
        ];

        const DAYS_AR = {
            0: "الأحد", 1: "الإثنين", 2: "الثلاثاء", 3: "الأربعاء", 4: "الخميس", 5: "الجمعة", 6: "السبت"
        };

        // روابط مجموعات الواتساب (يجب استبدالها بالروابط الفعلية لمجموعاتك)
        // الصيغة: "grade_section": "رابط_دعوة_المجموعة_هنا"
        const WHATSAPP_GROUPS = {
            "1_1": "https://chat.whatsapp.com/EXAMPLE_LINK_1_1",
            "1_2": "https://chat.whatsapp.com/EXAMPLE_LINK_1_2",
            "1_3": "https://chat.whatsapp.com/EXAMPLE_LINK_1_3",
            "1_4": "https://chat.whatsapp.com/EXAMPLE_LINK_1_4",
            "1_5": "https://chat.whatsapp.com/EXAMPLE_LINK_1_5",
            "1_6": "https://chat.whatsapp.com/EXAMPLE_LINK_1_6",
            "2_1": "https://chat.whatsapp.com/EXAMPLE_LINK_2_1",
            "2_2": "https://chat.whatsapp.com/EXAMPLE_LINK_2_2",
            "2_3": "https://chat.whatsapp.com/EXAMPLE_LINK_2_3",
            "2_4": "https://chat.whatsapp.com/EXAMPLE_LINK_2_4",
            "2_5": "https://chat.whatsapp.com/EXAMPLE_LINK_2_5",
            "2_6": "https://chat.whatsapp.com/EXAMPLE_LINK_2_6",
            "3_1": "https://chat.whatsapp.com/EXAMPLE_LINK_3_1",
            "3_2": "https://chat.whatsapp.com/EXAMPLE_LINK_3_2",
            "3_3": "https://chat.whatsapp.com/EXAMPLE_LINK_3_3",
            "3_4": "https://chat.whatsapp.com/EXAMPLE_LINK_3_4",
            "3_5": "https://chat.whatsapp.com/EXAMPLE_LINK_3_5",
            "3_6": "https://chat.whatsapp.com/EXAMPLE_LINK_3_6"
        };

        // ========== التهيئة عند تحميل الصفحة ==========
        window.onload = function() {
            populateSubjectSelect();
            openLoginModal(); // يجب على المعلم تسجيل الدخول أولاً
        };

        function populateSubjectSelect() {
            const subjectSelect = document.getElementById('subject-select');
            subjectSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
            SUBJECTS.forEach(subject => {
                const option = document.createElement('option');
                option.value = subject;
                option.textContent = subject;
                subjectSelect.appendChild(option);
            });
        }

        // ========== Modal تسجيل الدخول ==========
        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('teacherPassword').value = '';
            document.getElementById('loginError').classList.add('hidden');
            document.getElementById('teacherPassword').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        function attemptLogin() {
            const password = document.getElementById('teacherPassword').value;
            if (password === TEACHER_PASSWORD) {
                closeLoginModal();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        document.getElementById('teacherPassword')?.addEventListener('keypress', (e) => e.key === 'Enter' && attemptLogin());

        // ========== إرسال إلى واتساب ==========
        function sendToWhatsApp() {
            const grade = document.getElementById('teacherGrade').value;
            const section = document.getElementById('teacherSection').value;
            const subject = document.getElementById('subject-select').value;

            if (!subject) { 
                alert('الرجاء اختيار المادة أولاً.');
                return;
            }

            const homework = document.getElementById('homework_input').value;
            const page = document.getElementById('page_input').value;
            const dueDate = document.getElementById('dueDate_input').value;
            const examDate = document.getElementById('examDate_input').value;
            const notes = document.getElementById('notes_input').value;

            if (!homework && !examDate) {
                alert('الرجاء إدخال واجب أو موعد اختبار للإرسال.');
                return;
            }

            // الحصول على التاريخ الحالي لرسالة الواتساب
            const today = new Date();
            const dayName = DAYS_AR[today.getDay()];
            const gregorianDate = today.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
            const hijriDate = today.toLocaleDateString('ar-SA-u-ca-islamic', { year: 'numeric', month: 'long', day: 'numeric' });

            // تنسيق الرسالة
            let message = `*🏫 متوسطة المنذر بن عمرو الأنصاري*\n`;
            message += `*🗓️ تاريخ الإرسال:* ${dayName}، ${gregorianDate} (${hijriDate})\n`;
            message += `*📍 الصف:* ${grade} المتوسط / *شعبة:* ${section}\n`;
            message += `----------------------------------\n`;
            message += `*📚 المادة:* ${subject}\n`;
            
            if (homework) {
                message += `*📝 الواجب:* ${homework}\n`;
                if (page) message += `*📖 الصفحة:* ${page}\n`;
                if (dueDate) message += `*⏰ موعد التسليم:* ${dueDate}\n`;
            }

            if (examDate) {
                message += `*⚠️ تنبيه اختبار:* ${examDate}\n`;
            }

            if (notes) {
                message += `*💡 ملاحظات:* ${notes}\n`;
            }

            message += `----------------------------------\n`;
            message += `_تم الإرسال عبر نظام إدارة الواجبات المدرسية_`;

            // ترميز الرسالة للرابط
            const encodedMessage = encodeURIComponent(message);
            
            // الحصول على رابط المجموعة
            const groupKey = `${grade}_${section}`;
            const groupLink = WHATSAPP_GROUPS[groupKey];

            if (!groupLink || groupLink.includes("EXAMPLE_LINK")) {
                alert('لم يتم إعداد رابط مجموعة الواتساب لهذا الفصل. الرجاء التواصل مع المسؤول.');
                return;
            }

            // فتح واتساب
            // ملاحظة: روابط دعوة المجموعات (chat.whatsapp.com) لا تدعم النص المسبق مباشرة.
            // الطريقة الأكثر فعالية هي فتح رابط wa.me مع النص، ثم يختار المعلم المجموعة يدوياً.
            // إذا كان لديك أرقام هواتف المجموعات (وليس روابط دعوة)، يمكن استخدام wa.me/group_id?text=...
            // لكن هذا يتطلب WhatsApp Business API أو حلولًا أكثر تعقيدًا.
            // حالياً، سنفتح رابط واتساب مع النص المنسق، وعلى المعلم لصق النص في المجموعة الصحيحة.
            const whatsappUrl = `https://wa.me/?text=${encodedMessage}`;
            
            window.open(whatsappUrl, '_blank');

            alert('تم فتح واتساب. الرجاء لصق الرسالة في مجموعة الفصل الصحيحة.');
        }

    </script>

</body>
</html>
