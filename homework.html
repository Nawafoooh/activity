<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التواصل المدرسي - متوسطة المنذر بن عمرو الأنصاري</title>
    <style>
        /* ========== المتغيرات العامة ========== */
        :root {
            --primary-green: #2d5f3f;
            --light-green: #4a7c59;
            --bg-gray: #f5f5f5;
            --white: #ffffff;
            --border-gray: #ddd;
            --text-dark: #333;
            --text-gray: #666;
            --danger-red: #d32f2f;
            --warning-orange: #f57c00;
            --success-green: #388e3c;
        }

        /* ========== إعادة تعيين وإعدادات أساسية ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* ========== الهيدر الرسمي ========== */
        .header {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--light-green) 100%);
            color: var(--white);
            padding: 1.5rem 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .school-name {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .school-subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 0.25rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        /* ========== الأزرار ========== */
        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background-color: var(--white);
            color: var(--primary-green);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--white);
            border: 2px solid var(--white);
        }

        .btn-secondary:hover {
            background-color: var(--white);
            color: var(--primary-green);
        }

        .btn-success {
            background-color: var(--success-green);
            color: var(--white);
        }

        .btn-success:hover {
            background-color: #2e7d32;
        }

        /* ========== الحاوية الرئيسية ========== */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--white);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }

        .card-title {
            font-size: 1.3rem;
            color: var(--primary-green);
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border-gray);
        }

        /* ========== نماذج الإدخال ========== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-gray);
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(45, 95, 63, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        /* ========== جدول الواجبات ========== */
        .homework-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }

        .homework-table th,
        .homework-table td {
            padding: 1rem;
            text-align: right;
            border-bottom: 1px solid var(--border-gray);
        }

        .homework-table th {
            background-color: var(--primary-green);
            color: var(--white);
            font-weight: 600;
        }

        .homework-table tr:hover {
            background-color: #f9f9f9;
        }

        .exam-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background-color: var(--danger-red);
            color: var(--white);
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .no-exam {
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        /* ========== نموذج المعلم ========== */
        .teacher-input-grid {
            display: grid;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .subject-input-card {
            background-color: #fafafa;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-gray);
        }

        .subject-name {
            font-weight: 600;
            color: var(--primary-green);
            margin-bottom: 0.75rem;
            font-size: 1.05rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* ========== رسالة فارغة ========== */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-gray);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* ========== Modal تسجيل الدخول ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            padding: 2rem;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .modal-header {
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.3rem;
            color: var(--primary-green);
        }

        /* ========== الأدوات المساعدة ========== */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .mt-2 {
            margin-top: 1rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert-warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .done {
            text-decoration: line-through;
            color: var(--success-green);
        }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .school-name {
                font-size: 1.2rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .homework-table {
                font-size: 0.9rem;
            }

            .homework-table th,
            .homework-table td {
                padding: 0.75rem 0.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- ========== الهيدر ========== -->
    <header class="header">
        <div class="header-content">
            <div>
                <div class="school-name">🏫 متوسطة المنذر بن عمرو الأنصاري</div>
                <div class="school-subtitle">نظام التواصل بين المعلم وولي الأمر</div>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" id="viewModeBtn" onclick="toggleView()">
                    <span id="viewModeText">عرض واجهة المعلم</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ========== الحاوية الرئيسية ========== -->
    <div class="container">
        
        <!-- قسم عرض التاريخ -->
        <div class="card text-center">
            <h2 class="card-title">تاريخ اليوم</h2>
            <p id="gregorian-date"></p>
            <p id="hijri-date"></p>
        </div>

        <!-- ========== واجهة ولي الأمر ========== -->
        <div id="parentView">
            <div class="card">
                <h2 class="card-title">📋 عرض الواجبات والاختبارات</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">اليوم</label>
                        <select class="form-control" id="parentDay">
                            <option value="sunday">الأحد</option>
                            <option value="monday">الإثنين</option>
                            <option value="tuesday">الثلاثاء</option>
                            <option value="wednesday">الأربعاء</option>
                            <option value="thursday">الخميس</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">الصف</label>
                        <select class="form-control" id="parentGrade">
                            <option value="1">الأول المتوسط</option>
                            <option value="2">الثاني المتوسط</option>
                            <option value="3">الثالث المتوسط</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">الشعبة</label>
                        <select class="form-control" id="parentSection">
                            <option value="1">شعبة 1</option>
                            <option value="2">شعبة 2</option>
                            <option value="3">شعبة 3</option>
                            <option value="4">شعبة 4</option>
                            <option value="5">شعبة 5</option>
                            <option value="6">شعبة 6</option>
                        </select>
                    </div>
                </div>

                <div style="text-align: center; margin-top: 1rem;">
                    <button class="btn btn-success" onclick="loadHomeworkForParent()">
                        عرض الواجبات
                    </button>
                </div>
            </div>

            <!-- جدول عرض الواجبات -->
            <div class="card" id="homeworkDisplay" style="display: none;">
                <h2 class="card-title" id="homeworkTitle">الواجبات والاختبارات</h2>
                <div id="homeworkContent"></div>
            </div>
        </div>

        <!-- ========== واجهة المعلم ========== -->
        <div id="teacherView" class="hidden">
            <div class="card">
                <h2 class="card-title">👨‍🏫 إدارة الواجبات - واجهة المعلم</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">اليوم</label>
                        <select class="form-control" id="teacherDay">
                            <option value="sunday">الأحد</option>
                            <option value="monday">الإثنين</option>
                            <option value="tuesday">الثلاثاء</option>
                            <option value="wednesday">الأربعاء</option>
                            <option value="thursday">الخميس</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">الصف</label>
                        <select class="form-control" id="teacherGrade">
                            <option value="1">الأول المتوسط</option>
                            <option value="2">الثاني المتوسط</option>
                            <option value="3">الثالث المتوسط</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">الشعبة</label>
                        <select class="form-control" id="teacherSection">
                            <option value="1">شعبة 1</option>
                            <option value="2">شعبة 2</option>
                            <option value="3">شعبة 3</option>
                            <option value="4">شعبة 4</option>
                            <option value="5">شعبة 5</option>
                            <option value="6">شعبة 6</option>
                        </select>
                    </div>
                </div>

                <div id="subjectsForm"></div>

                <div class="text-center mt-2">
                    <button class="btn btn-success" onclick="saveHomework()">
                        💾 حفظ البيانات
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- ========== Modal تسجيل الدخول ========== -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">🔐 تسجيل دخول المعلم</h3>
            </div>
            <div class="form-group">
                <label class="form-label">كلمة المرور</label>
                <input type="password" class="form-control" id="teacherPassword" placeholder="أدخل كلمة المرور">
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-success" onclick="attemptLogin()" style="flex: 1;">دخول</button>
                <button class="btn btn-secondary" onclick="closeLoginModal()" style="flex: 1;">إلغاء</button>
            </div>
            <div id="loginError" class="alert alert-danger hidden" style="margin-top: 1rem;">
                كلمة المرور غير صحيحة
            </div>
        </div>
    </div>

    <!-- ========== JavaScript ========== -->
    <script>
        // ========== إعدادات النظام ==========
        const TEACHER_PASSWORD = "teacher123"; // كلمة مرور المعلم (قابلة للتعديل)
        const STORAGE_KEY = "school_homework_data";

        // المواد الدراسية
        const SUBJECTS = [
            "التربية الإسلامية",
            "اللغة العربية",
            "الرياضيات",
            "العلوم",
            "الاجتماعيات",
            "اللغة الإنجليزية",
            "التربية الفنية",
            "التربية البدنية",
            "الحاسب الآلي"
        ];

        // الأيام بالعربية
        const DAYS_AR = {
            sunday: "الأحد",
            monday: "الإثنين",
            tuesday: "الثلاثاء",
            wednesday: "الأربعاء",
            thursday: "الخميس"
        };

        // متغيرات الحالة
        let isTeacherLoggedIn = false;

        // ========== التهيئة عند تحميل الصفحة ==========
        window.onload = function() {
            displayCurrentDate();
            loadSubjectsForm();
            
            // تحديث العرض عند تغيير الاختيارات في واجهة ولي الأمر
            document.getElementById('parentDay').addEventListener('change', autoLoadHomework);
            document.getElementById('parentGrade').addEventListener('change', autoLoadHomework);
            document.getElementById('parentSection').addEventListener('change', autoLoadHomework);

            // تحديث النموذج عند تغيير الاختيارات في واجهة المعلم
            document.getElementById('teacherDay').addEventListener('change', loadSubjectsForm);
            document.getElementById('teacherGrade').addEventListener('change', loadSubjectsForm);
            document.getElementById('teacherSection').addEventListener('change', loadSubjectsForm);

            // تحميل تلقائي لواجهة ولي الأمر
            loadHomeworkForParent();
        };

        // ========== عرض التاريخ الحالي ==========
        function displayCurrentDate() {
            const today = new Date();
            const gregorianDate = today.toLocaleDateString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const hijriDate = today.toLocaleDateString('ar-SA-u-ca-islamic', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            document.getElementById('gregorian-date').textContent = `الميلادي: ${gregorianDate}`;
            document.getElementById('hijri-date').textContent = `الهجري: ${hijriDate}`;
        }

        // ========== التبديل بين الواجهات ==========
        function toggleView() {
            if (isTeacherLoggedIn) {
                // الخروج من واجهة المعلم
                isTeacherLoggedIn = false;
                document.getElementById('parentView').classList.remove('hidden');
                document.getElementById('teacherView').classList.add('hidden');
                document.getElementById('viewModeText').textContent = 'عرض واجهة المعلم';
            } else {
                // محاولة الدخول لواجهة المعلم
                openLoginModal();
            }
        }

        // ========== Modal تسجيل الدخول ==========
        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('teacherPassword').value = '';
            document.getElementById('loginError').classList.add('hidden');
            document.getElementById('teacherPassword').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        function attemptLogin() {
            const password = document.getElementById('teacherPassword').value;
            if (password === TEACHER_PASSWORD) {
                isTeacherLoggedIn = true;
                closeLoginModal();
                document.getElementById('parentView').classList.add('hidden');
                document.getElementById('teacherView').classList.remove('hidden');
                document.getElementById('viewModeText').textContent = 'العودة لواجهة ولي الأمر';
                loadSubjectsForm();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        // السماح بالضغط على Enter لتسجيل الدخول
        document.getElementById('teacherPassword')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') attemptLogin();
        });

        // ========== إدارة البيانات ==========
        function getStorageKey(day, grade, section) {
            return `${day}_${grade}_${section}`;
        }

        function getAllData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : {};
        }

        function saveData(allData) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
        }

        function getHomeworkData(day, grade, section) {
            const allData = getAllData();
            const key = getStorageKey(day, grade, section);
            return allData[key] || null;
        }

        function setHomeworkData(day, grade, section, homeworkData) {
            const allData = getAllData();
            const key = getStorageKey(day, grade, section);
            allData[key] = homeworkData;
            saveData(allData);
        }

        // ========== نموذج إدخال المواد (المعلم) ==========
        function loadSubjectsForm() {
            const day = document.getElementById('teacherDay').value;
            const grade = document.getElementById('teacherGrade').value;
            const section = document.getElementById('teacherSection').value;

            const existingData = getHomeworkData(day, grade, section);

            let html = '<div class="teacher-input-grid">';

            SUBJECTS.forEach((subject, index) => {
                const subjectData = existingData?.subjects?.[subject] || {
                    homework: '',
                    page: '',
                    dueDate: '',
                    examDate: '',
                    notes: ''
                };

                html += `
                    <div class="subject-input-card">
                        <div class="subject-name">${subject}</div>
                        <div class="form-group">
                            <label class="form-label">الواجب</label>
                            <input type="text" class="form-control" id="homework_${index}" 
                                   value="${subjectData.homework}" placeholder="مثال: حل التمارين">
                        </div>
                        <div class="form-group">
                            <label class="form-label">الصفحة / رقم التمرين</label>
                            <input type="text" class="form-control" id="page_${index}" 
                                   value="${subjectData.page}" placeholder="مثال: ص 45">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">موعد تسليم الواجب</label>
                                <input type="date" class="form-control" id="dueDate_${index}" value="${subjectData.dueDate}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">موعد الاختبار</label>
                                <input type="date" class="form-control" id="examDate_${index}" value="${subjectData.examDate}">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">ملاحظات</label>
                            <input type="text" class="form-control" id="notes_${index}" 
                                   value="${subjectData.notes}" placeholder="ملاحظات إضافية (اختياري)">
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            document.getElementById('subjectsForm').innerHTML = html;
        }

        // ========== حفظ البيانات (المعلم) ==========
        function saveHomework() {
            const day = document.getElementById('teacherDay').value;
            const grade = document.getElementById('teacherGrade').value;
            const section = document.getElementById('teacherSection').value;

            const homeworkData = {
                subjects: {},
                timestamp: new Date().toISOString()
            };

            SUBJECTS.forEach((subject, index) => {
                const homework = document.getElementById(`homework_${index}`).value;
                const page = document.getElementById(`page_${index}`).value;
                const dueDate = document.getElementById(`dueDate_${index}`).value;
                const examDate = document.getElementById(`examDate_${index}`).value;
                const notes = document.getElementById(`notes_${index}`).value;

                homeworkData.subjects[subject] = {
                    homework,
                    page,
                    dueDate,
                    examDate,
                    notes,
                    done: false
                };
            });

            setHomeworkData(day, grade, section, homeworkData);
            
            alert('✅ تم حفظ البيانات بنجاح!');
        }

        // ========== تحميل الواجبات (ولي الأمر) ==========
        function loadHomeworkForParent() {
            const day = document.getElementById('parentDay').value;
            const grade = document.getElementById('parentGrade').value;
            const section = document.getElementById('parentSection').value;

            const data = getHomeworkData(day, grade, section);

            const displayDiv = document.getElementById('homeworkDisplay');
            const contentDiv = document.getElementById('homeworkContent');
            const titleDiv = document.getElementById('homeworkTitle');

            if (!data || Object.keys(data.subjects).length === 0) {
                displayDiv.style.display = 'block';
                titleDiv.textContent = `الواجبات - ${DAYS_AR[day]} - الصف ${grade}/شعبة ${section}`;
                contentDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>لا توجد واجبات مسجلة لهذا اليوم</p>
                    </div>
                `;
                return;
            }

            titleDiv.textContent = `الواجبات - ${DAYS_AR[day]} - الصف ${grade}/شعبة ${section}`;

            let tableHTML = `
                <table class="homework-table">
                    <thead>
                        <tr>
                            <th>المادة</th>
                            <th>الواجب</th>
                            <th>الصفحة</th>
                            <th>التسليم/الاختبار</th>
                            <th>ملاحظات</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            let hasAnyHomework = false;

            SUBJECTS.forEach((subject, index) => {
                const subjectData = data.subjects[subject];
                if (subjectData && (subjectData.homework || subjectData.examDate)) {
                    hasAnyHomework = true;
                    const remainingDaysInfo = getRemainingDays(subjectData.dueDate);
                    const examRemainingDaysInfo = getRemainingDays(subjectData.examDate);

                    let alertClass = '';
                    if (remainingDaysInfo.days === 1) alertClass = 'alert-danger';
                    else if (remainingDaysInfo.days === 2) alertClass = 'alert-warning';
                    
                    let examAlertClass = '';
                    if (examRemainingDaysInfo.days > 0 && examRemainingDaysInfo.days <= 3) examAlertClass = 'alert-danger';

                    tableHTML += `
                        <tr class="${subjectData.done ? 'done' : ''}">
                            <td><strong>${subject}</strong></td>
                            <td>${subjectData.homework || '-'}</td>
                            <td>${subjectData.page || '-'}</td>
                            <td class="${alertClass}">
                                ${subjectData.dueDate ? `تسليم الواجب: ${remainingDaysInfo.text}` : ''}
                                ${subjectData.examDate ? `  
<span class="exam-badge ${examAlertClass}">اختبار بعد: ${examRemainingDaysInfo.text}</span>` : ''}
                            </td>
                            <td>${subjectData.notes || '-'}</td>
                            <td>
                                <button class="btn btn-sm ${subjectData.done ? 'btn-secondary' : 'btn-success'}" onclick="toggleDone('${day}', '${grade}', '${section}', '${subject}')">
                                    ${subjectData.done ? 'إلغاء' : 'تم الإنجاز'}
                                </button>
                            </td>
                        </tr>
                    `;
                }
            });

            tableHTML += `
                    </tbody>
                </table>
            `;

            if (hasAnyHomework) {
                contentDiv.innerHTML = tableHTML;
                displayDiv.style.display = 'block';
            } else {
                contentDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>لا توجد واجبات مسجلة لهذا اليوم</p>
                    </div>
                `;
                displayDiv.style.display = 'block';
            }
        }

        // ========== حساب الأيام المتبقية ==========
        function getRemainingDays(dateString) {
            if (!dateString) return { days: Infinity, text: '-' };
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const dueDate = new Date(dateString);
            const diffTime = dueDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays < 0) return { days: diffDays, text: 'فات موعده' };
            if (diffDays === 0) return { days: 0, text: 'اليوم' };
            if (diffDays === 1) return { days: 1, text: 'غدًا' };
            return { days: diffDays, text: `${diffDays} أيام` };
        }

        // ========== تبديل حالة الإنجاز ==========
        function toggleDone(day, grade, section, subject) {
            const allData = getAllData();
            const key = getStorageKey(day, grade, section);
            if (allData[key] && allData[key].subjects[subject]) {
                allData[key].subjects[subject].done = !allData[key].subjects[subject].done;
                saveData(allData);
                loadHomeworkForParent();
            }
        }

        // ========== التحميل التلقائي عند تغيير الاختيارات ==========
        function autoLoadHomework() {
            loadHomeworkForParent();
        }
    </script>

</body>
</html>
